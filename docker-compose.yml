services:
  holo-summary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holo-summary
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DATABASE_URL=jdbc:postgresql://db:5432/holo_summary
      - DATABASE_USERNAME=${DB_USERNAME}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - TRANSCRIPTION_API_URL=http://transcript-crawler:8000/api/transcript
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
    volumes:
      - ./:/app
      - maven-cache:/root/.m2
    depends_on:
      db:
        condition: service_healthy

  transcript-crawler:
    build:
      context: ./python-transcript-crawler
      dockerfile: Dockerfile
    container_name: transcript-crawler
    environment:
      - WINDOWS_TAILSCALE_IP=${WINDOWS_TAILSCALE_IP}
      - PROXY_PORT=${PROXY_PORT}
    volumes:
      - ./python-transcript-crawler:/app

  db:
    image: postgres:17.9
    container_name: holo-summary-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: holo_summary
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d holo_summary"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  maven-cache:
  postgres-data: