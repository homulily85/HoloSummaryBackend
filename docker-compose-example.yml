services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holo-summary-dev
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=
      - SPRING_DATASOURCE_USERNAME=
      - SPRING_DATASOURCE_PASSWORD=
      - TRANSCRIPTION_API_URL=http://transcript-crawler:8000/api/transcript
    volumes:
      - ./:/app
      - maven-cache:/root/.m2
    depends_on:
      db:
        condition: service_healthy

  transcript-crawler:
    build:
      context: ./python-transcript-crawler
      dockerfile: Dockerfile
    container_name: transcript-crawler

  db:
    image: postgres:17.9
    container_name: spring-boot-dev-db
    environment:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      POSTGRES_DB:
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {your_usename} -d {your_dbname}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  maven-cache:
  postgres-data: