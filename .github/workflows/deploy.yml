name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push compiled images to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 1. Log in to GitHub Container Registry on the GitHub Runner
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub

      # 2. Build the images and push them to the registry
      - name: Build and Push Docker Images
        run: |
          docker compose -f prod.docker-compose.yml build
          docker compose -f prod.docker-compose.yml push

      # 3. Only copy the configuration files to the server (no source code needed!)
      - name: Copy docker-compose and configs to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "prod.docker-compose.yml,nginx.conf"
          target: "~/holosummary/"

      # 4. Connect to the server, authenticate, pull, and run
      - name: Execute Docker Compose on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/holosummary/
            cd ~/holosummary/
            
            # Create/Overwrite the .env file securely
            cat <<EOF > .env
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            OPEN_ROUTER_API_KEY=${{ secrets.OPEN_ROUTER_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            FRONTEND_DOMAIN=${{ secrets.FRONTEND_DOMAIN }}
            WINDOWS_TAILSCALE_IP=${{ secrets.WINDOWS_TAILSCALE_IP }}
            PROXY_PORT=${{ secrets.PROXY_PORT }}
            TUNNEL_TOKEN=${{ secrets.TUNNEL_TOKEN }}
            EOF
            
            # Log the server into GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull new images
            docker compose -f prod.docker-compose.yml pull
            
            # Start containers (add --no-build for safety)
            docker compose -f prod.docker-compose.yml up -d --no-build
            
            # Force Nginx to re-resolve the new container IPs
            docker exec holosummary-nginx nginx -s reload
            
            # Clean up old images to save disk space
            docker image prune -f