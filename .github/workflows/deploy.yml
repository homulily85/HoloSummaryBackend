name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push compiled images to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 1. Log in to GitHub Container Registry on the GitHub Runner
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub

      - name: Create .env file for Docker Compose
        run: |
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" > .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "OPEN_ROUTER_API_KEY=${{ secrets.OPEN_ROUTER_API_KEY }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo "WINDOWS_TAILSCALE_IP=${{ secrets.WINDOWS_TAILSCALE_IP }}" >> .env
          echo "PROXY_PORT=${{ secrets.PROXY_PORT }}" >> .env

      # 2. Build the images and push them to the registry
      - name: Build and Push Docker Images
        run: |
          docker compose -f prod.docker-compose.yml build
          docker compose -f prod.docker-compose.yml push

      # 3. Only copy the configuration files to the server (no source code needed!)
      - name: Copy docker-compose and configs to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "prod.docker-compose.yml" # Add any other needed configs here, comma-separated (e.g., "docker-compose.yml,nginx.conf")
          target: "/opt/holosummary-backend/"

      # 4. Connect to the server, authenticate, pull, and run
      - name: Execute Docker Compose on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/holosummary-backend/
            
            # Create/Overwrite the .env file with secrets from GitHub
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "OPEN_ROUTER_API_KEY=${{ secrets.OPEN_ROUTER_API_KEY }}" >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
            echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
            
            # Log the server into GHCR so it has permission to pull your private image
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull and start using the specific prod file
            docker compose -f prod.docker-compose.yml pull
            docker compose -f prod.docker-compose.yml up -d
            
            # Clean up old images
            docker image prune -f