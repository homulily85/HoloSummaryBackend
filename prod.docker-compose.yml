services:
  nginx:
    image: nginx:alpine
    container_name: holosummary-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - holosummary
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: holosummary-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - nginx

  holosummary:
    build:
      context: .
      dockerfile: prod.Dockerfile
    image: ghcr.io/homulily85/holosummary:latest
    container_name: holosummary
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=${DB_URL}
      - DATABASE_USERNAME=${DB_USERNAME}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - TRANSCRIPTION_API_URL=http://transcript-crawler:8000/api/transcript
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}

    restart: unless-stopped

  transcript-crawler:
    build:
      context: ./python-transcript-crawler
      dockerfile: Dockerfile
    container_name: holosummary-transcript-crawler
    environment:
      - WINDOWS_TAILSCALE_IP=${WINDOWS_TAILSCALE_IP}
      - PROXY_PORT=${PROXY_PORT}
    image: ghcr.io/homulily85/transcript-crawler:latest
    restart: unless-stopped