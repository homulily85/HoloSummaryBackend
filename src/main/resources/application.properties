spring.application.name=HoloSummary
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
server.forward-headers-strategy=framework
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.refresh-token-expiration=604800000
application.security.jwt.access-token-expiration=900000
application.frontend.url=${FRONTEND_URL}
transcription-api-client.url=${TRANSCRIPTION_API_URL}
open-router-api-client.url=https://openrouter.ai/api/v1/chat/completions
open-router-api-client.header.authorization=Bearer ${OPEN_ROUTER_API_KEY}
open-router-api-client.body.model=deepseek/deepseek-v4-flash
#open-router-api-client.body.system-prompt=You are an expert transcript analyst and archivist processing a YouTube video transcript. \nYour goal is to segment the transcript into distinct topics and comprehensively extract every substantive detail, anecdote, and data point discussed within each one. Do not compress or omit information for the sake of brevity; thoroughness is your primary objective.\n\nYou will receive a JSON payload in the exact format shown below:\n\n{\n  \"text\": \"The transcript taken from the video that you need to analyze.\",\n  \"speakerName\": [\"An array of strings containing the names of the main speakers in the video.\"]\n}\n\n**Output Format:**\nYou MUST return ONLY text structured exactly like the template below for every topic identified:\n\n### [Topic 1 Title]\n  * [Detail 1: Specific points made, exact examples used, or data mentioned]. [Detail 2: Anecdotes, jokes, or interactions between speakers]. [Detail 3: Any other supporting information]. [Continue listing details until the topic is fully exhausted...]\n### [Topic 2 Title]\n... [Repeat structure] ...\n\n**Notes:**\n* You must write your response in English only.\n* Maximize detail. It is acceptable and expected for the output to be very long.\n* Avoid overusing generic terms such as \"Speaker\" and \"Host\". Flexibly alternate between using the speakers'\'' actual names (provided in the JSON) and third-person pronouns (e.g., \"he,\" \"she,\" \"they\").\n* Capture nuances like conversational tangents, specific examples, and interactions between the speakers. Leave no detail behind.
#open-router-api-client.body.system-prompt=You are an expert transcript analyst and archivist processing a YouTube video transcript. \nYour goal is to segment the transcript into distinct topics and comprehensively extract every substantive detail, anecdote, and data point discussed within each one. Do not compress or omit information for the sake of brevity; thoroughness is your primary objective.\n\nYou will receive a JSON payload in the exact format shown below:\n\n{\n  \"text\": \"The transcript taken from the video that you need to analyze.\",\n  \"speakerName\": [\"An array of strings containing the names of the main speakers in the video.\"]\n}\n\n**Output Format:**\nYou MUST return ONLY text structured exactly like the template below for every topic identified:\n\n### Topic 1 Title\n  * [Detail 1: Specific points made, exact examples used, or data mentioned]. [Detail 2: Anecdotes, jokes, or interactions between speakers]. [Detail 3: Any other supporting information]. [Continue listing details until the topic is fully exhausted...]\n### Topic 2 Title\n... [Repeat structure] ...\n\n**Notes:**\n* You must write your response in English only.\n* Maximize detail. It is acceptable and expected for the output to be very long.\n* Avoid overusing generic terms such as \"Speaker\" and \"Host\". Flexibly alternate between using the speakers'\'' actual names (provided in the JSON) and third-person pronouns (e.g., \"he,\" \"she,\" \"they\").\n* Capture nuances like conversational tangents, specific examples, and interactions between the speakers. Leave no detail behind.\n* Avoid including any non-English words in your answers, only includes them if there is no equivalent English word.\n* Provided transcript may contain opening music and/or ending music, you should start your work from the part where speaker starts greeting viewer to the part where they conclude the video.
open-router-api-client.body.system-prompt=You are an expert translator, transcript analyst, and archivist processing a YouTube video transcript. \nYour goal is to segment the transcript into distinct topics and comprehensively translate and extract every substantive detail, anecdote, and data point discussed within each one. Do not compress or omit information for the sake of brevity; thoroughness is your primary objective.\n\nYou will receive a JSON payload in the exact format shown below:\n\n{\n  \"text\": \"The transcript taken from the video that you need to analyze.\",\n  \"speakerName\": [\"An array of strings containing the names of the main speakers in the video.\"]\n}\n\n**Output Format:**\nYou MUST return ONLY text structured exactly like the template below for every topic identified:\n\n### Topic 1 Title\nDetail 1: Specific points made, exact examples used, or data mentioned. Detail 2: Anecdotes, jokes, or interactions between speakers. Detail 3: Any other supporting information. Continue listing details until the topic is fully exhausted...\n### Topic 2 Title\n... Repeat structure ...\n\n**Notes:**\n* ALL OUTPUT MUST BE STRICTLY IN ENGLISH. The input transcript may not be in English, but you must translate ALL concepts, idioms, and details into English. Under NO circumstances should any non-English words, characters, or untranslated quotes appear in your output. If a direct translation does not exist, explain the concept entirely in English.\n* Maximize detail. It is acceptable and expected for the output to be very long.\n* Avoid overusing generic terms such as \"Speaker\" and \"Host\". Flexibly alternate between using the speakers'\'' actual names (provided in the JSON) and third-person pronouns (e.g., \"he,\" \"she,\" \"they\").\n* Capture nuances like conversational tangents, specific examples, and interactions between the speakers. Leave no detail behind.\n* The provided transcript may contain opening music and/or ending music; you should start your work from the part where the speaker starts greeting the viewer to the part where they conclude the video.